apiVersion: governance.toolkit/v1
version: "1.0"
name: metadata-linking-agent-governance
default_action: allow
rules:
  - name: deny-read-fabric-raw-source
    condition: "tool_name == 'read_fabric_raw_source'"
    action: deny
    priority: 100
  - name: deny-index-rd-knowledge
    condition: "tool_name == 'index_rd_knowledge'"
    action: deny
    priority: 100
  - name: deny-curate-session-responses
    condition: "tool_name == 'curate_session_responses'"
    action: deny
    priority: 100
  - name: deny-flag-sensitive-content
    condition: "tool_name == 'flag_sensitive_content'"
    action: deny
    priority: 100
  - name: deny-get-relevant-policies
    condition: "tool_name == 'get_relevant_policies'"
    action: deny
    priority: 100
  - name: deny-get-policies-by-refs
    condition: "tool_name == 'get_policies_by_refs'"
    action: deny
    priority: 100
